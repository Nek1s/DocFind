server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Сжатие gzip для уменьшения трафика
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Хешированные ассеты Vite (/assets/*) — иммутабельный долгосрочный кеш.
    # Имена файлов содержат хеш контента, поэтому их можно кешировать навсегда.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Проксирование запросов к API на бэкенд
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA: все неизвестные маршруты отдаём index.html
    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }
}
