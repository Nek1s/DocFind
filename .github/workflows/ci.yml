name: CI

# Базовый пайплайн контроля качества: запускается при пуше и PR в main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Бэкенд (линтер + тесты)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Линтер (ruff)
        run: ruff check .

      - name: Юнит-тесты (pytest)
        run: pytest

  frontend:
    name: Фронтенд (линтер + сборка)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Установка зависимостей
        run: npm ci

      - name: Линтер (ESLint)
        run: npm run lint

      - name: Сборка
        run: npm run build
